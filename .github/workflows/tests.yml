name: KPager CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          # Убираем cache: gradle отсюда, так как ниже добавим более мощный экшен

      # Официальный экшен от Gradle (работает стабильнее и кеширует лучше, чем setup-java)
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Устанавливаем виртуальный дисплей для Compose UI тестов
      - name: Install xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb

      # Оборачиваем вызов jvmTest в xvfb-run
      - name: Run JVM Tests
        run: xvfb-run ./gradlew :paging-core:jvmTest

      - name: Run Android Tests
        run: ./gradlew :paging-core:testDebugUnitTest
